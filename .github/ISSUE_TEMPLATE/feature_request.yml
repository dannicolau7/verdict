name: Feature request
description: Propose a new capability or improvement.
title: "feat: "
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Adapters
        - Agents (generator / executor / judge / reporter)
        - CLI
        - Caching
        - Observability
        - Stats / CI
        - Attack patterns / adaptive mode
        - Docs / examples
        - Other
    validations:
      required: true
